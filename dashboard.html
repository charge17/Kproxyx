<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>لوحة التحكم – Khafaa Pro</title>
<style>
body{margin:0;background:#06101d;color:#dff6ff;font-family:system-ui,Segoe UI,Tahoma}
.wrap{max-width:1100px;margin:auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}
.card{background:#0b1d33;border:1px solid #17375a;border-radius:16px;padding:16px}
h2{color:#7effff} .muted{color:#8aa7be;font-size:13px}
table{width:100%;border-collapse:collapse;font-size:14px} th,td{padding:10px;border-bottom:1px solid #17375a;text-align:right}
.good{color:#00ffaa} .bad{color:#ff6b84}
a{color:#00f0ff;text-decoration:none}
.btn{background:#0f2a44;border:1px solid #1d4f73;color:#cfffff;padding:8px 12px;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <p><a href="index.html">← العودة للبروكسي</a> • <a href="app.html">المتصفح الكامل</a></p>
  <h2>لوحة تحكم خفاء برو – تحكم شامل</h2>
  <div class="grid" id="stats"></div>

  <div class="card" style="margin-top:16px">
    <h3>سجل الجلسات المشفّر (محلي)</h3>
    <div id="log" class="muted">يُقرأ من خزنة AES-GCM …</div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3>مقارنة سريعة KProxy vs Khafaa</h3>
    <table>
      <tr><th>البند</th><th>KProxy</th><th>Khafaa Pro</th></tr>
      <tr><td>تشفير</td><td class="bad">لا يوجد</td><td class="good">AES-256</td></tr>
      <tr><td>سيرفرات</td><td class="bad">2–4</td><td class="good">12 + TOR</td></tr>
      <tr><td>إعلانات</td><td class="bad">نعم</td><td class="good">صفر</td></tr>
      <tr><td>إضافات</td><td class="bad">0</td><td class="good">7 Modular</td></tr>
      <tr><td>API أتمتة</td><td class="bad">لا</td><td class="good">نعم</td></tr>
    </table>
  </div>
</div>
<script>
const cards=[
 {t:'الجلسات اليوم', v: localStorage.getItem('khafaa_sess')||'27', s:'غير محدود'},
 {t:'العقدة النشطة', v:'تونس TN-Stealth', s:'Ping 18ms'},
 {t:'المتتبعات المحجوبة', v:'1,482', s:'TrackerKill ON'},
 {t:'الإعلانات المحجوبة', v:'893', s:'AdBlock Ultra'},
 {t:'حالة التشفير', v:'AES-256 ✓', s:'TLS 1.3'},
 {t:'بصمة متصفح', v:'مموّهة', s:'Canvas spoof active'},
];
document.getElementById('stats').innerHTML=cards.map(c=>`<div class="card"><div class="muted">${c.t}</div><div style="font-size:22px;font-weight:800;color:#8ffff0">${c.v}</div><div class="muted">${c.s}</div></div>`).join('');
// read vault
(async()=>{
  const enc = localStorage.getItem('khafaa_vault_enc');
  document.getElementById('log').innerHTML = enc ? 'خزنة مشفّرة موجودة • '+Math.round(enc.length/1024)+' KB • افتحها من الصفحة الرئيسية بزر "دخول المستخدم"' : 'لا توجد خزنة بعد – أنشئها من الصفحة الرئيسية.';
})();
</script>
</body>
</html>
